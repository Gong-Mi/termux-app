name: Engine Comparison (Java vs Rust)

on:
  push:
    branches:
      - master
      - feature/rust-integration
  pull_request:
    branches:
      - master
      - feature/rust-integration
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  ANDROID_NDK_VERSION: 26.1.10909125
  RUST_TOOLCHAIN: stable

jobs:
  performance:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Current Branch (Rust)
        uses: actions/checkout@v6

      - name: Checkout Baseline Branch (Java Master)
        uses: actions/checkout@v6
        with:
          ref: master
          path: baseline-java

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Build & Run Baseline (Pure Java)
        working-directory: baseline-java
        run: |
          ./gradlew :terminal-emulator:test --tests com.termux.terminal.TerminalPerformanceTest --info | tee ../java_baseline.log || true

      - name: Build Rust Engine
        run: |
          cd terminal-emulator/src/main/rust
          cargo build --release
          mkdir -p ../jniLibs/x86_64
          cp target/release/libtermux_rust.so ../jniLibs/x86_64/

      - name: Build & Run Current (Rust Integrated)
        run: |
          ./gradlew :terminal-emulator:test --tests com.termux.terminal.TerminalPerformanceTest --info | tee rust_current.log || true
          
      - name: Generate Detailed Comparison Report
        run: |
          echo "### ⚡ Comprehensive Engine Comparison (Master Java vs Feature Rust)" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Master (Java) | Current (Rust) | Speedup | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------------|----------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # 定义解析函数
          extract_speed() {
            grep "Performance:" $1 | grep "$2" | tail -n 1 | sed -r 's/.*: ([0-9.]+) MB.*/\1/'
          }

          J_RAW=$(extract_speed java_baseline.log "Raw Text")
          R_RAW=$(extract_speed rust_current.log "Raw Text")
          if [ ! -z "$J_RAW" ] && [ ! -z "$R_RAW" ]; then
            RATIO=$(echo "scale=2; $R_RAW / $J_RAW" | bc)
            echo "| Raw Text Throughput | $J_RAW MB/s | $R_RAW MB/s | ${RATIO}x | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi

          J_ANSI=$(extract_speed java_baseline.log "ANSI Escape")
          R_ANSI=$(extract_speed rust_current.log "ANSI Escape")
          if [ ! -z "$J_ANSI" ] && [ ! -z "$R_ANSI" ]; then
            RATIO=$(echo "scale=2; $R_ANSI / $J_ANSI" | bc)
            echo "| ANSI Sequence Heavy | $J_ANSI MB/s | $R_ANSI MB/s | ${RATIO}x | ✅ |" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/terminal-emulator/src/main/jniLibs/x86_64

  consistency:
    name: 🛡️ Logic Consistency Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Run Rust Logic Tests
        run: |
          cd terminal-emulator/src/main/rust
          cargo test --test consistency -- --nocapture
