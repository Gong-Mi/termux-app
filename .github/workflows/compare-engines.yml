name: Engine Comparison (Java vs Rust)

on:
  push:
    branches:
      - master
      - feature/rust-integration
  pull_request:
    branches:
      - master
      - feature/rust-integration
  workflow_dispatch:

env:
  JAVA_VERSION: 17
  ANDROID_NDK_VERSION: 29.0.14206865
  RUST_TOOLCHAIN: stable

jobs:
  performance:
    name: ⚡ Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Setup Rust Caching
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: false
          shared-key: "termux-rust-engine"
          target-dir: false

      # ========== Java Performance Test (Master Branch) ==========
      - name: Checkout Master for Java Baseline
        uses: actions/checkout@v6
        with:
          ref: master
          path: baseline-java

      - name: Build & Run Java Baseline
        working-directory: baseline-java
        run: |
          echo "=== Running Java Performance Test (Master Branch) ==="
          # 运行所有单元测试，从日志中提取性能测试结果
          ./gradlew :terminal-emulator:testDebugUnitTest --info 2>&1 | tee ../java_baseline.log || \
          ./gradlew :terminal-emulator:test --info 2>&1 | tee ../java_baseline.log || \
          echo "Java tests could not be executed"

      # ========== Rust Engine Build ==========
      - name: Build Rust Engine
        run: |
          cd terminal-emulator/src/main/rust
          cargo build --release
          mkdir -p ../jniLibs/x86_64
          cp target/release/libtermux_rust.so ../jniLibs/x86_64/

      # ========== Rust Integrated Test ==========
      - name: Build & Run Rust Integrated
        run: |
          echo "=== Running Java Test with Rust Engine ==="
          ./gradlew :terminal-emulator:testDebugUnitTest --info 2>&1 | tee rust_integrated.log || \
          ./gradlew :terminal-emulator:test --info 2>&1 | tee rust_integrated.log || \
          echo "Java tests with Rust engine could not be executed"

      # ========== Rust Native Performance Test ==========
      - name: Run Rust Native Performance Tests
        run: |
          echo "=== Running Rust Native Performance Tests ==="
          cd terminal-emulator/src/main/rust
          cargo test --test performance --release -- --nocapture 2>&1 | tee rust_perf.log

      # ========== Extract Metrics ==========
      - name: Extract Java Metrics
        run: |
          if [ -f java_baseline.log ]; then
            J_RAW=$(grep "Raw Text Performance:" java_baseline.log | tail -1 | sed -r 's/.*: ([0-9.]+) MB.*/\1/' || echo "")
            J_ANSI=$(grep "ANSI Escape Performance:" java_baseline.log | tail -1 | sed -r 's/.*: ([0-9.]+) MB.*/\1/' || echo "")
            echo "JAVA_RAW_TEXT_MBPS=${J_RAW:-N/A}" >> java_metrics.env
            echo "JAVA_ANSI_MBPS=${J_ANSI:-N/A}" >> java_metrics.env
            echo "Java metrics: RAW=${J_RAW:-N/A}, ANSI=${J_ANSI:-N/A}"
          fi

      - name: Extract Rust Metrics
        run: |
          if [ -f rust_perf.log ]; then
            R_RAW=$(grep "RUST_RAW_TEXT_MBPS=" rust_perf.log | tail -1 | sed 's/.*=//' || echo "")
            R_ANSI=$(grep "RUST_ANSI_MBPS=" rust_perf.log | tail -1 | sed 's/.*=//' || echo "")
            R_CURSOR=$(grep "RUST_CURSOR_OPS=" rust_perf.log | tail -1 | sed 's/.*=//' || echo "")
            R_SCROLL=$(grep "RUST_SCROLL_LINES=" rust_perf.log | tail -1 | sed 's/.*=//' || echo "")
            R_WIDECHAR=$(grep "RUST_WIDECHAR_OPS=" rust_perf.log | tail -1 | sed 's/.*=//' || echo "")
            R_SMALLBATCH=$(grep "RUST_SMALLBATCH_OPS=" rust_perf.log | tail -1 | sed 's/.*=//' || echo "")
            
            echo "RUST_RAW_TEXT_MBPS=${R_RAW:-N/A}" > rust_metrics.env
            echo "RUST_ANSI_MBPS=${R_ANSI:-N/A}" >> rust_metrics.env
            echo "RUST_CURSOR_OPS=${R_CURSOR:-N/A}" >> rust_metrics.env
            echo "RUST_SCROLL_LINES=${R_SCROLL:-N/A}" >> rust_metrics.env
            echo "RUST_WIDECHAR_OPS=${R_WIDECHAR:-N/A}" >> rust_metrics.env
            echo "RUST_SMALLBATCH_OPS=${R_SMALLBATCH:-N/A}" >> rust_metrics.env
            
            echo "=== Rust Metrics ==="
            cat rust_metrics.env
          fi

      # ========== Generate Report ==========
      - name: Generate Comparison Report
        run: |
          source java_metrics.env 2>/dev/null || true
          source rust_metrics.env 2>/dev/null || true
          
          echo "### ⚡ Java vs Rust Performance Comparison Report" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### 📊 Core Metrics Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Java (Master) | Rust (Native) | Speedup |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------------|---------------|---------|" >> $GITHUB_STEP_SUMMARY
          
          # Raw Text
          if [ -n "$JAVA_RAW_TEXT_MBPS" ] && [ "$JAVA_RAW_TEXT_MBPS" != "N/A" ] && \
             [ -n "$RUST_RAW_TEXT_MBPS" ] && [ "$RUST_RAW_TEXT_MBPS" != "N/A" ]; then
            RATIO=$(echo "scale=2; $RUST_RAW_TEXT_MBPS / $JAVA_RAW_TEXT_MBPS" | bc 2>/dev/null || echo "N/A")
            if [ $(echo "$RATIO >= 1.5" | bc 2>/dev/null || echo "0") -eq 1 ]; then
              STATUS="🚀 +$(( ($(echo "$RATIO * 100" | bc | cut -d. -f1) - 100) ))%"
            elif [ $(echo "$RATIO >= 1.0" | bc 2>/dev/null || echo "0") -eq 1 ]; then
              STATUS="✅ +$(( ($(echo "$RATIO * 100" | bc | cut -d. -f1) - 100) ))%"
            else
              STATUS="⚠️ $(( 100 - $(echo "$RATIO * 100" | bc | cut -d. -f1) ))% slower"
            fi
            echo "| Raw Text | ${JAVA_RAW_TEXT_MBPS} MB/s | ${RUST_RAW_TEXT_MBPS} MB/s | ${RATIO}x $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Raw Text | ${JAVA_RAW_TEXT_MBPS:-N/A} MB/s | ${RUST_RAW_TEXT_MBPS:-N/A} MB/s | N/A |" >> $GITHUB_STEP_SUMMARY
          fi
          
          # ANSI Escape
          if [ -n "$JAVA_ANSI_MBPS" ] && [ "$JAVA_ANSI_MBPS" != "N/A" ] && \
             [ -n "$RUST_ANSI_MBPS" ] && [ "$RUST_ANSI_MBPS" != "N/A" ]; then
            RATIO=$(echo "scale=2; $RUST_ANSI_MBPS / $JAVA_ANSI_MBPS" | bc 2>/dev/null || echo "N/A")
            if [ $(echo "$RATIO >= 1.5" | bc 2>/dev/null || echo "0") -eq 1 ]; then
              STATUS="🚀 +$(( ($(echo "$RATIO * 100" | bc | cut -d. -f1) - 100) ))%"
            elif [ $(echo "$RATIO >= 1.0" | bc 2>/dev/null || echo "0") -eq 1 ]; then
              STATUS="✅ +$(( ($(echo "$RATIO * 100" | bc | cut -d. -f1) - 100) ))%"
            else
              STATUS="⚠️ $(( 100 - $(echo "$RATIO * 100" | bc | cut -d. -f1) ))% slower"
            fi
            echo "| ANSI Escape | ${JAVA_ANSI_MBPS} MB/s | ${RUST_ANSI_MBPS} MB/s | ${RATIO}x $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ANSI Escape | ${JAVA_ANSI_MBPS:-N/A} MB/s | ${RUST_ANSI_MBPS:-N/A} MB/s | N/A |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🦀 Rust Additional Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cursor Movement | ${RUST_CURSOR_OPS:-N/A} K ops/s |" >> $GITHUB_STEP_SUMMARY
          echo "| Scrolling | ${RUST_SCROLL_LINES:-N/A} K lines/s |" >> $GITHUB_STEP_SUMMARY
          echo "| Wide Char | ${RUST_WIDECHAR_OPS:-N/A} K chars/s |" >> $GITHUB_STEP_SUMMARY
          echo "| Small Batch | ${RUST_SMALLBATCH_OPS:-N/A} K calls/s |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📝 Notes" >> $GITHUB_STEP_SUMMARY
          echo "- **Java**: Tests run on master branch (pure Java implementation)" >> $GITHUB_STEP_SUMMARY
          echo "- **Rust**: Native tests run on current branch (Rust implementation)" >> $GITHUB_STEP_SUMMARY
          echo "- Speedup = Rust / Java (>1 means Rust is faster)" >> $GITHUB_STEP_SUMMARY
          echo "- All tests use identical input data (same seed: 42) for fair comparison" >> $GITHUB_STEP_SUMMARY

  consistency:
    name: 🛡️ Logic Consistency Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Setup Rust Caching
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: false
          shared-key: "termux-rust-engine"
          target-dir: false

      - name: Run Rust Logic Tests
        run: |
          cd terminal-emulator/src/main/rust
          cargo test --test consistency -- --nocapture

  branch-consistency:
    name: 🔀 Branch Consistency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Feature Branch
        uses: actions/checkout@v6
        with:
          path: feature

      - name: Checkout Master Branch
        uses: actions/checkout@v6
        with:
          ref: master
          path: master

      - name: Compare Test Results
        run: |
          echo "### 🔀 Branch Consistency Check Report" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Feature Branch:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 比较 Rust 测试文件
          echo "#### 🦀 Rust Test Files Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          FEATURE_RUST_TEST="feature/terminal-emulator/src/main/rust/tests/consistency.rs"
          MASTER_RUST_TEST="master/terminal-emulator/src/main/rust/tests/consistency.rs"
          
          if [ -f "$FEATURE_RUST_TEST" ] && [ -f "$MASTER_RUST_TEST" ]; then
            echo "✅ Rust consistency test exists in both branches" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # 比较测试数量
            FEATURE_TEST_COUNT=$(grep -c "#\[test\]" "$FEATURE_RUST_TEST" || echo "0")
            MASTER_TEST_COUNT=$(grep -c "#\[test\]" "$MASTER_RUST_TEST" || echo "0")
            
            echo "| Branch | Test Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
            echo "| Feature | $FEATURE_TEST_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Master | $MASTER_TEST_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FEATURE_TEST_COUNT" -eq "$MASTER_TEST_COUNT" ]; then
              echo "✅ Same number of tests in both branches" >> $GITHUB_STEP_SUMMARY
            else
              DIFF=$((FEATURE_TEST_COUNT - MASTER_TEST_COUNT))
              if [ $DIFF -gt 0 ]; then
                echo "⚠️ Feature branch has $DIFF more test(s) than master" >> $GITHUB_STEP_SUMMARY
              else
                echo "⚠️ Feature branch has $((-DIFF)) fewer test(s) than master" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          else
            echo "⚠️ Rust consistency test not found in one or both branches" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 比较 Java 测试文件
          echo "#### ☕ Java Test Files Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          FEATURE_JAVA_TEST="feature/terminal-emulator/src/test/java/com/termux/terminal/TerminalPerformanceTest.java"
          MASTER_JAVA_TEST="master/terminal-emulator/src/test/java/com/termux/terminal/TerminalPerformanceTest.java"
          
          if [ -f "$FEATURE_JAVA_TEST" ] && [ -f "$MASTER_JAVA_TEST" ]; then
            echo "✅ Java performance test exists in both branches" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # 比较测试方法数量
            FEATURE_JAVA_COUNT=$(grep -c "public void test" "$FEATURE_JAVA_TEST" || echo "0")
            MASTER_JAVA_COUNT=$(grep -c "public void test" "$MASTER_JAVA_TEST" || echo "0")
            
            echo "| Branch | Test Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------------|" >> $GITHUB_STEP_SUMMARY
            echo "| Feature | $FEATURE_JAVA_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| Master | $MASTER_JAVA_COUNT |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Java performance test not found in one or both branches" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # 显示文件差异摘要
          echo "#### 📝 Key File Differences" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Click to expand file differences</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "##### terminal-emulator/build.gradle" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          diff -u master/terminal-emulator/build.gradle feature/terminal-emulator/build.gradle 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || echo "No differences or files not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "##### Cargo.toml" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          diff -u master/terminal-emulator/src/main/rust/Cargo.toml feature/terminal-emulator/src/main/rust/Cargo.toml 2>/dev/null | head -50 >> $GITHUB_STEP_SUMMARY || echo "No differences or files not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "</details>" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### ✅ Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- This check compares test files between feature and master branches" >> $GITHUB_STEP_SUMMARY
          echo "- Use the detailed diff view to understand specific changes" >> $GITHUB_STEP_SUMMARY
          echo "- Run the Performance Benchmark job for actual test execution results" >> $GITHUB_STEP_SUMMARY
