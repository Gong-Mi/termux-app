# Rust CI 工作流
# 用于验证 Rust 终端引擎的代码质量和测试

name: Rust CI

on:
  push:
    branches:
      - master
      - feature/rust-integration
    paths:
      - 'terminal-emulator/src/main/rust/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    branches:
      - master
      - feature/rust-integration
    paths:
      - 'terminal-emulator/src/main/rust/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Rust 代码格式检查
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: |
          cd terminal-emulator/src/main/rust
          cargo fmt -- --check

  # Rust 代码静态分析
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Run Clippy
        run: |
          cd terminal-emulator/src/main/rust
          cargo clippy --all-targets --all-features -- -D warnings

  # Rust 单元测试
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            terminal-emulator/src/main/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('terminal-emulator/src/main/rust/Cargo.lock') }}
      
      - name: Run Tests
        run: |
          cd terminal-emulator/src/main/rust
          cargo test --test consistency -- --test-threads=1
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-test-results
          path: terminal-emulator/src/main/rust/target/cargo_target_dir/debug/deps/*.d

  # Android 交叉编译检查
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - i686-linux-android
          - x86_64-linux-android
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.0
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            terminal-emulator/src/main/rust/target
          key: ${{ runner.os }}-cargo-android-${{ matrix.target }}-${{ hashFiles('terminal-emulator/src/main/rust/Cargo.lock') }}
      
      - name: Build for ${{ matrix.target }}
        run: |
          cd terminal-emulator/src/main/rust
          cargo ndk -t ${{ matrix.target == 'aarch64-linux-android' && 'arm64-v8a' || matrix.target == 'armv7-linux-androideabi' && 'armeabi-v7a' || matrix.target == 'i686-linux-android' && 'x86' || 'x86_64' }} -p 24 build --release
        
        env:
          CARGO_TARGET_${{ matrix.target == 'aarch64-linux-android' && 'AARCH64' || matrix.target == 'armv7-linux-androideabi' && 'ARMV7' || matrix.target == 'i686-linux-android' && 'I686' || 'X86_64' }}_LINKER: clang

  # 真正的 ARM64 运行环境测试
  arm64-native-test:
    name: Native ARM64 Tests
    runs-on: ubuntu-24.04-arm64
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run Native ARM Tests
        run: |
          cd terminal-emulator/src/main/rust
          # 由于是原生 ARM 环境，直接跑测试即可
          cargo test --test consistency -- --test-threads=1

  # 文档检查
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build Documentation
        run: |
          cd terminal-emulator/src/main/rust
          cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings
